<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman Dubey | Python Developer & ML Engineer</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css?v=2">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fade-in-down {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in-down {
            animation: fade-in-down 0.8s ease-out forwards;
        }
        
        .animate-fade-in-up {
            animation: fade-in-up 0.8s ease-out forwards;
            opacity: 0;
        }
        
        .animation-delay-200 {
            animation-delay: 0.2s;
        }
        
        .animation-delay-400 {
            animation-delay: 0.4s;
        }
        
        .animation-delay-600 {
            animation-delay: 0.6s;
        }
        
        .animation-delay-800 {
            animation-delay: 0.8s;
        }
        
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .animate-gradient {
            background-size: 200% 200%;
            animation: gradient-shift 3s ease infinite;
        }

        /* Hide Spline Logo if possible or style viewer */
        spline-viewer {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-black overflow-hidden h-screen w-screen relative">

    <!-- Visual overlays -->
    <div class="grain-overlay"></div>
    <div class="scanlines-overlay hidden md:block"></div>

    <!-- Ambient cursor glow -->
    <div id="cursor-glow"></div>

    <!-- HUD corners -->
    <div class="hud-corner hud-tl">
        <span><span class="hud-dot"></span>SYS//ONLINE</span>
    </div>
    <div class="hud-corner hud-tr">
        <span id="hud-clock">00:00:00 IST</span>
    </div>
    <div class="hud-corner hud-bl">
        <span>LOC//MUMBAI · IN</span>
    </div>
    <div class="hud-corner hud-br">
        <span>BUILD//v2.0 · REV.2B9</span>
    </div>

    <!-- Status ticker -->
    <div class="status-ticker hidden md:flex">
        <span class="hud-dot"></span>
        <span id="status-ticker-text">LINK: stable</span>
        <span class="sep">·</span>
        <span>press <kbd style="font-family:inherit;padding:1px 6px;border:1px solid rgba(247,147,26,0.3);border-radius:4px;color:#FFD600;">→</kbd> to explore</span>
    </div>

    <!-- Shader Canvas (Background) -->
    <canvas id="shader-canvas" class="absolute inset-0 w-full h-full object-cover touch-none" style="background: black;"></canvas>

    <!-- Main Content Overlay -->
    <div class="absolute inset-0 z-10 flex flex-col lg:flex-row items-center justify-center lg:justify-between pointer-events-none p-6 md:p-12 lg:p-20">
        
        <!-- Left Column: Text Content -->
        <div class="lg:w-1/2 flex flex-col items-center lg:items-start text-center lg:text-left space-y-6 pointer-events-auto z-20">
            
            <!-- Trust Badge -->
            <div class="animate-fade-in-down" data-magnetic="0.2">
                <div class="flex items-center gap-2 px-4 py-2 bg-orange-500/10 backdrop-blur-md border border-orange-300/30 rounded-full text-xs md:text-sm">
                    <span class="relative flex h-2 w-2">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    <span class="text-orange-100">Available for Work</span>
                </div>
            </div>

            <!-- Headings -->
            <div class="space-y-2">
                <h1 class="text-5xl md:text-7xl lg:text-8xl font-bold bg-gradient-to-r from-orange-300 via-yellow-400 to-amber-300 bg-clip-text text-transparent animate-fade-in-up animation-delay-200 leading-tight">
                    <span class="glitch" data-text="Aman Dubey">Aman Dubey</span>
                </h1>
                <h2 class="text-2xl md:text-4xl lg:text-5xl font-bold bg-gradient-to-r from-yellow-300 via-orange-400 to-red-400 bg-clip-text text-transparent animate-fade-in-up animation-delay-400 pb-2">
                    <span data-scramble="1400" class="scramble-target">Python Developer & ML Engineer</span>
                </h2>
            </div>
            
            <!-- Subtitle -->
            <div class="max-w-xl animate-fade-in-up animation-delay-600">
                <p class="text-lg md:text-xl text-orange-100/90 font-light leading-relaxed">
                    Building Digital Intelligence. Crafting scalable ML solutions and data-driven architectures in the digital void.
                </p>
            </div>
            
            <!-- CTA Button -->
            <div class="pt-6 animate-fade-in-up animation-delay-800" data-magnetic="0.25">
                <a href="main.html" class="group relative overflow-hidden inline-flex items-center justify-center h-14 w-64 rounded-full font-semibold text-lg transition-all duration-300 bg-gradient-to-r from-orange-500 to-yellow-500 text-black shadow-lg hover:shadow-orange-500/25 cursor-pointer">
                    <span class="mr-8 transition-opacity duration-500 group-hover:opacity-0">
                        Know about me
                    </span>
                    <div class="absolute right-1 top-1 bottom-1 rounded-full z-10 grid w-12 place-items-center transition-all duration-500 bg-black/10 group-hover:w-[calc(100%-0.5rem)] group-active:scale-95">
                        <i data-lucide="chevron-right" class="w-6 h-6 text-black"></i>
                    </div>
                </a>
            </div>
        </div>

        <!-- Right Column: Spline Robot Scene -->
        <div class="lg:w-1/2 w-full h-[40vh] lg:h-full flex items-center justify-center pointer-events-auto relative z-10 mt-8 lg:mt-0 animate-fade-in-up animation-delay-800">
            <!-- Spline Viewer Script -->
            <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.54/build/spline-viewer.js"></script>
            <spline-viewer url="https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode"></spline-viewer>
        </div>

    </div>

    <!-- Shader Logic -->
    <script src="landing.js?v=2"></script>
    <script src="visuals.js?v=2"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
